# Pipeline: https://dev.azure.com/dnceng/internal/_build?definitionId=1298

# Note: This pipeline can never run automatically because the sourceBranch parameter is required.
trigger: none
pr: none

# Required to set a custom run name within workload-build.yml.
# See: https://learn.microsoft.com/en-us/azure/devops/pipelines/yaml-schema/pipeline
appendCommitMessageToRunName: false

parameters:
- name: sourceBranch
  displayName: 🚩 Source branch 🚩
  type: string
- name: createTestWorkloadSet
  displayName: ⭐ Create a test workload set
  type: boolean
  default: false

- name: dividerAzDO
  displayName: '[ ######## AZURE DEVOPS ######## ]'
  type: boolean
  default: false
- name: publishToAzDO
  displayName: Publish package(s) to AzDO
  type: boolean
  default: false
- name: azDOPublishFeed
  displayName: AzDO publish feed
  type: string
  default: public/dotnet-workloads
- name: downloadWorkloadNupkgs
  displayName: Download workload packages (.nupkg)
  type: boolean
  default: false
- name: workloadNupkgExcludeList
  displayName: Exclude workload packages (.nupkg)
  type: object
  default:
  - emsdk
  - mono

- name: dividerVSInsertion
  displayName: '[ ######## VS INSERTION ######## ]'
  type: boolean
  default: false
- name: createVSInsertion
  displayName: Create VS insertion
  type: boolean
  default: false
- name: vsTopicBranch
  displayName: 'VS topic branch [default: temp/{team}/{target}/yyyy-MM]'
  type: string
  default: '|default|'
- name: workloadDropNames
  displayName: Workload drop names
  type: object
  default:
  - emsdk
  - mono
  - iOS
  - android
  - maui
# These insert (pre)components & packs into VS.
- name: primaryVsInsertionBranches
  displayName: Primary VS insertion branches
  type: object
  default:
  - main
# These insert packs only into VS [no (pre)components].
- name: secondaryVsInsertionBranches
  displayName: 'Secondary VS insertion branches [packs only]'
  type: object
  default: []

- name: dividerOfficial
  displayName: '[ ######## OFFICIAL ######## ]'
  type: boolean
  default: false
- name: stabilizePackageVersion
  displayName: 🚨 Stabilize package version
  type: boolean
  default: false
- name: publishToNuGet
  displayName: 🚨 Publish to NuGet.org
  type: boolean
  default: false

- name: dividerAdvanced
  displayName: '[ ######## ADVANCED ######## ]'
  type: boolean
  default: false
- name: usePreComponentsForVSInsertion
  displayName: Use preview components for VS insertion
  type: boolean
  default: false
- name: includeNonShippingWorkloads
  displayName: Include non-shipping workloads
  type: boolean
  default: false

- name: dividerSetVersion
  displayName: '[ ######## SET VERSION ######## ]'
  type: boolean
  default: false
- name: setVersionSdkMinor
  displayName: Set version SDK minor (one digit)
  type: string
  default: '|default|'
- name: setVersionFeature
  displayName: Set version feature (two digits)
  type: string
  default: '|default|'
- name: setVersionPatch
  displayName: Set version patch
  type: string
  default: '|default|'
- name: setPreReleaseVersionLabel
  displayName: Set pre-release version label
  type: string
  default: '|default|'
  values:
  - '|default|'
  - servicing
  - preview
  - rc
  - alpha
  - rtm
  - test
- name: setPreReleaseVersionIteration
  displayName: Set pre-release version iteration
  type: string
  default: '|default|'

variables:
# Variables used: DncEngInternalBuildPool
- template: /eng/common/templates-official/variables/pool-providers.yml@source
- name: AgentImageInternal
  value: windows.vs2026preview.scout.amd64
############### ARCADE ###############
# Both this (used in Arcade for the MicroBuildSigningPlugin) and DotNetSignType (used in Arcade in Sign.proj) are necessary to set the sign type.
# https://github.com/dotnet/arcade/blob/ccae251ef033746eb0213329953f5e3c1687693b/Documentation/ArcadeSdk.md#common-steps-in-azure-devops-pipeline
- name: _SignType
  value: real
- name: _TeamName
  value: DotNet-Cli
- name: _BuildConfig
  value: Release
- name: PostBuildSign
  value: false
############### GROUPS ###############
# Provides TSA variables for automatic bug reporting.
- group: DotNet-CLI-SDLValidation-Params
# Release-Pipeline provides: BotAccount-dotnet-bot-repo-PAT, dn-bot-all-drop-rw-code-rw-release-all
# https://dnceng.visualstudio.com/internal/_library?itemType=VariableGroups&view=VariableGroupView&variableGroupId=87&path=Release-Pipeline
- group: Release-Pipeline
# DotNet-DevDiv-Insertion-Workflow-Variables provides: dn-bot-devdiv-drop-rw-code-rw
# https://dnceng.visualstudio.com/internal/_library?itemType=VariableGroups&view=VariableGroupView&variableGroupId=33&path=DotNet-DevDiv-Insertion-Workflow-Variables
- group: DotNet-DevDiv-Insertion-Workflow-Variables

resources:
  repositories:
  - repository: 1esPipelines
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release
  - repository: source
    type: git
    name: internal/dotnet-workload-versions
    ref: ${{ format('refs/heads/{0}', parameters.sourceBranch) }}

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1esPipelines
  parameters:
    settings:
      # Default is 'Permissive,CFSClean' which blocks NuGet.org for publishing.
      # Docs: https://eng.ms/docs/cloud-ai-platform/devdiv/one-engineering-system-1es/1es-build/cloudbuild/security/1espt-network-isolation
      networkIsolationPolicy: Permissive
    sdl:
      # Docs: https://eng.ms/docs/cloud-ai-platform/devdiv/one-engineering-system-1es/1es-docs/1es-pipeline-templates/features/sdlanalysis/sourceanalysisstage#my-pipeline-uses-multiple-repositories-how-to-ensure-that-sdl-sources-stage-is-injected-for-all-the-repositories
      sourceRepositoriesToScan:
        include:
        - repository: source
      sourceAnalysisPool:
        name: $(DncEngInternalBuildPool)
        image: $(AgentImageInternal)
        os: windows
      policheck:
        enabled: true
      # Variables for TSA set within the DotNet-CLI-SDLValidation-Params variable group.
      # Docs: https://eng.ms/docs/cloud-ai-platform/devdiv/one-engineering-system-1es/1es-docs/1es-pipeline-templates/features/sdlanalysis/tsasupport
      tsa:
        enabled: true
        configFile: $(System.DefaultWorkingDirectory)\.config\tsaoptions.json
      # Docs: https://eng.ms/docs/cloud-ai-platform/devdiv/one-engineering-system-1es/1es-docs/1es-pipeline-templates/features/sdlanalysis/credscan#customizations
      credscan:
        suppressionsFile: $(System.DefaultWorkingDirectory)\.config\CredScanSuppressions.json
    stages:
    - stage: Build
      displayName: Build
      jobs:
      - template: /eng/pipelines/templates/jobs/workload-build.yml@self
        parameters:
          stabilizePackageVersion: ${{ parameters.stabilizePackageVersion }}
          createVSInsertion: ${{ parameters.createVSInsertion }}
          usePreComponentsForVSInsertion: ${{ parameters.usePreComponentsForVSInsertion }}
          includeNonShippingWorkloads: ${{ parameters.includeNonShippingWorkloads }}
          workloadDropNames: ${{ parameters.workloadDropNames }}
          createTestWorkloadSet: ${{ parameters.createTestWorkloadSet }}
          setVersionSdkMinor: ${{ parameters.setVersionSdkMinor }}
          setVersionFeature: ${{ parameters.setVersionFeature }}
          setVersionPatch: ${{ parameters.setVersionPatch }}
          setPreReleaseVersionLabel: ${{ parameters.setPreReleaseVersionLabel }}
          setPreReleaseVersionIteration: ${{ parameters.setPreReleaseVersionIteration }}
          downloadWorkloadNupkgs: ${{ parameters.downloadWorkloadNupkgs }}
          workloadNupkgExcludeList: ${{ parameters.workloadNupkgExcludeList }}

    - ${{ if eq(parameters.createVSInsertion, true) }}:
      - stage: Insertion
        displayName: Insertion
        dependsOn: Build
        jobs:
        - template: /eng/pipelines/templates/jobs/workload-insertion-job.yml@self
          parameters:
            vsTopicBranch: ${{ parameters.vsTopicBranch }}
            workloadDropNames: ${{ parameters.workloadDropNames }}
            primaryVsInsertionBranches: ${{ parameters.primaryVsInsertionBranches }}
            secondaryVsInsertionBranches: ${{ parameters.secondaryVsInsertionBranches }}

    - ${{ if or(eq(parameters.publishToAzDO, true), eq(parameters.publishToNuGet, true)) }}:
      - stage: Publish
        displayName: Publish
        dependsOn: Build
        jobs:
        - deployment: PublishFeeds
          displayName: Publish to feed(s)
          # Environment: https://dnceng.visualstudio.com/internal/_environments/42
          environment: DotNet-SDK-Workloads
          pool:
            name: $(DncEngInternalBuildPool)
            image: $(AgentImageInternal)
            os: windows
          templateContext:
            # Docs: https://eng.ms/docs/cloud-ai-platform/devdiv/one-engineering-system-1es/1es-docs/1es-pipeline-templates/features/releasepipelines/overview
            type: releaseJob
            isProduction: true
          strategy:
            runOnce:
              deploy:
                steps:
                # 1ES docs: https://eng.ms/docs/cloud-ai-platform/devdiv/one-engineering-system-1es/1es-docs/1es-pipeline-templates/features/inputs
                - task: 1ES.DownloadPipelineArtifact@1
                  displayName: 🟣 Download build artifacts
                  inputs:
                    artifactName: Artifacts
                    targetPath: $(System.DefaultWorkingDirectory)/artifacts
                # 1ES docs: https://eng.ms/docs/cloud-ai-platform/devdiv/one-engineering-system-1es/1es-docs/1es-pipeline-templates/features/outputs/nuget-packages
                # DotNetCoreCLI@2 docs: https://learn.microsoft.com/en-us/azure/devops/pipelines/tasks/reference/dotnet-core-cli-v2
                - ${{ if eq(parameters.publishToAzDO, true) }}:
                  - task: 1ES.PublishNuget@1
                    name: InitialPublishToAzDO
                    displayName: 🟣 Publish packages to AzDO
                    continueOnError: true
                    inputs:
                      useDotNetTask: true
                      packagesToPush: $(System.DefaultWorkingDirectory)/artifacts/packages/**/*.nupkg
                      packageParentPath: $(System.DefaultWorkingDirectory)/artifacts
                      publishVstsFeed: ${{ parameters.azDOPublishFeed }}
                  - powershell: |
                      $ErrorActionPreference = 'Stop'

                      $headers = @{
                        Authorization = "Bearer $env:SYSTEM_ACCESSTOKEN"
                      }

                      $timelineUrl = "$(System.CollectionUri)$(System.TeamProject)/_apis/build/builds/$(Build.BuildId)/timeline?api-version=7.1-preview.1"
                      $timeline = Invoke-RestMethod -Method Get -Uri $timelineUrl -Headers $headers

                      $publishStep = $timeline.records |
                        Where-Object { $_.name -eq '🟣 Publish packages to AzDO' } |
                        Sort-Object -Property lastModified -Descending |
                        Select-Object -First 1

                      if (-not $publishStep -or -not $publishStep.log -or -not $publishStep.log.url) {
                        throw "Could not locate logs for the failed AzDO publish task."
                      }

                      $publishLogUrl = "$($publishStep.log.url)?api-version=7.1-preview.2"
                      $publishLog = (Invoke-WebRequest -Uri $publishLogUrl -Headers $headers -UseBasicParsing).Content

                      $upstreamConflictMessage = "exists in at least one of the feed's upstream sources"
                      if ($publishLog -notmatch [Regex]::Escape($upstreamConflictMessage)) {
                        throw "AzDO publish failed for a reason other than an upstream-source conflict."
                      }

                      $feedParts = '${{ parameters.azDOPublishFeed }}'.Split('/', 2)
                      if ($feedParts.Count -eq 2) {
                        $projectName = $feedParts[0]
                        $feedName = $feedParts[1]
                      } else {
                        $projectName = $null
                        $feedName = $feedParts[0]
                      }

                      $collectionUri = "$(System.CollectionUri)".TrimEnd('/')
                      if ([string]::IsNullOrEmpty($projectName)) {
                        $feedUrl = "$collectionUri/_apis/packaging/feeds/$feedName?api-version=7.2-preview.1"
                      } else {
                        $feedUrl = "$collectionUri/$projectName/_apis/packaging/feeds/$feedName?api-version=7.2-preview.1"
                      }

                      try {
                        $feed = Invoke-RestMethod -Method Get -Uri $feedUrl -Headers $headers
                      } catch {
                        throw "Failed to retrieve feed '$feedName'. Verify that the feed exists and this pipeline has permission to manage feed settings."
                      }

                      if (-not $feed.allowExternalVersions) {
                        $body = @{
                          name = $feed.name
                          allowExternalVersions = $true
                        } | ConvertTo-Json -Compress

                        Invoke-RestMethod `
                          -Method Patch `
                          -Uri $feedUrl `
                          -Headers ($headers + @{ 'Content-Type' = 'application/json' }) `
                          -Body $body
                      }

                      Write-Host "##vso[task.setvariable variable=RetryAzdoPublish]true"
                    displayName: 🟣 Enable allowExternalVersions after upstream conflict
                    condition: and(succeededOrFailed(), eq(variables['Agent.JobStatus'], 'SucceededWithIssues'))
                    env:
                      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
                  - task: 1ES.PublishNuget@1
                    displayName: 🟣 Retry package publish to AzDO
                    condition: and(succeededOrFailed(), eq(variables['RetryAzdoPublish'], 'true'))
                    inputs:
                      useDotNetTask: true
                      packagesToPush: $(System.DefaultWorkingDirectory)/artifacts/packages/**/*.nupkg
                      packageParentPath: $(System.DefaultWorkingDirectory)/artifacts
                      publishVstsFeed: ${{ parameters.azDOPublishFeed }}
                - ${{ if eq(parameters.publishToNuGet, true) }}:
                  - task: 1ES.PublishNuget@1
                    displayName: 🟣 Publish packages to NuGet.org
                    inputs:
                      useDotNetTask: false
                      packagesToPush: $(System.DefaultWorkingDirectory)/artifacts/packages/**/*.nupkg
                      packageParentPath: $(System.DefaultWorkingDirectory)/artifacts
                      nuGetFeedType: external
                      publishVstsFeed: https://api.nuget.org/v3/index.json
                      # Service connection: https://dev.azure.com/dnceng/internal/_settings/adminservices?resourceId=479fdc43-a27d-4f5f-b2fc-5cf19dce159a
                      publishFeedCredentials: nuget.org (dotnetframework)
